# Railway (Nixpacks) sozlamasi
# Tizim dasturlarini qo'shadi:
#  - libreoffice     : Word (.docx) -> PDF aylantirish uchun (chop etiladigan test PDF)
#  - fonts-liberation: PDF shriftlari to'g'ri chiqishi uchun (Times o'rniga)
#  - libglib2.0-0    : opencv (skaner) import bo'lishi uchun kerak bo'lishi mumkin
#
# Bu qatorlar Python o'rnatilishiga tegmaydi — faqat qo'shimcha tizim paketlari.
# Ishga tushirish buyrug'i esa Procfile'dan olinadi (o'zgarmaydi).

[phases.setup]
aptPkgs = ["libreoffice", "fonts-liberation", "libglib2.0-0"]
